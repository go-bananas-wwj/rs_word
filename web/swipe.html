<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河流笔画卡片筛选</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="swipe-body">
    <header class="swipe-header">
        <div>
            <h1>河流笔画卡片筛选</h1>
            <p id="save-path"></p>
        </div>
        <div class="review-toolbar">
            <label>
                笔画
                <select id="stroke-filter">
                    <option value="all">全部</option>
                </select>
            </label>
            <label>
                状态
                <select id="status-filter">
                    <option value="unreviewed">未筛</option>
                    <option value="all">全部</option>
                    <option value="selected">勾</option>
                    <option value="rejected">叉</option>
                </select>
            </label>
            <button id="prev-card" type="button">上一张</button>
            <a class="swipe-link" href="/review">网格</a>
        </div>
    </header>

    <main class="swipe-main">
        <section class="swipe-stats" id="stats"></section>
        <section class="swipe-stage" id="stage">
            <p class="review-loading">加载中...</p>
        </section>
    </main>

    <script>
        const stage = document.getElementById('stage');
        const stats = document.getElementById('stats');
        const savePath = document.getElementById('save-path');
        const strokeFilter = document.getElementById('stroke-filter');
        const statusFilter = document.getElementById('status-filter');
        const prevCard = document.getElementById('prev-card');

        const state = {
            offset: 0,
            total: 0,
            current: null,
            history: [],
            strokesLoaded: false,
            loading: false,
        };

        function buildUrl(offset) {
            const params = new URLSearchParams({
                stroke: strokeFilter.value,
                status: statusFilter.value,
                offset,
                limit: 1,
            });
            return `/api/review/items?${params.toString()}`;
        }

        async function loadCard(offset = state.offset) {
            if (state.loading) return;
            state.loading = true;
            stage.innerHTML = '<p class="review-loading">加载中...</p>';
            const response = await fetch(buildUrl(offset));
            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.detail || `请求失败：${response.status}`);
            }
            const data = await response.json();
            state.loading = false;
            state.total = data.total;
            state.offset = Math.min(offset, Math.max(data.total - 1, 0));
            savePath.textContent = `标注保存到：${data.selection_path}`;
            renderFilters(data);
            renderStats(data);
            if (!data.items.length) {
                state.current = null;
                stage.innerHTML = '<p class="review-loading">这个筛选条件下没有图片。</p>';
                return;
            }
            state.current = data.items[0];
            renderCard(state.current);
        }

        function renderFilters(data) {
            if (state.strokesLoaded) return;
            for (const stroke of data.strokes) {
                const option = document.createElement('option');
                option.value = stroke;
                option.textContent = `${stroke} (${data.stroke_counts[stroke]})`;
                strokeFilter.appendChild(option);
            }
            state.strokesLoaded = true;
        }

        function renderStats(data) {
            const current = data.total === 0 ? 0 : state.offset + 1;
            stats.innerHTML = `
                <span>当前 ${current} / ${data.total}</span>
                <span>全部 ${data.status_counts.all}</span>
                <span>已勾 ${data.status_counts.selected}</span>
                <span>已叉 ${data.status_counts.rejected}</span>
                <span>未筛 ${data.status_counts.unreviewed}</span>
            `;
            prevCard.disabled = state.history.length === 0;
        }

        function renderCard(item) {
            stage.innerHTML = `
                <article class="swipe-card" data-chip-id="${item.chip_id}">
                    <div class="swipe-image-wrap">
                        <a href="${item.label_url}" target="_blank" rel="noreferrer">
                            <img src="${item.image_url}" alt="${item.chip_id}">
                        </a>
                    </div>
                    <div class="swipe-card-info">
                        <div class="swipe-meta">
                            <strong>${item.stroke_type}</strong>
                            <span>#${item.rank ?? '-'}</span>
                            <span>${item.river ?? '-'}</span>
                            <span>${item.datetime ? item.datetime.slice(0, 10) : '-'}</span>
                        </div>
                        <textarea id="note" placeholder="标注这张图..." rows="4">${item.note || ''}</textarea>
                        <div class="swipe-actions">
                            <button class="reject" type="button" data-decision="rejected">叉</button>
                            <button class="skip" type="button" data-decision="unreviewed">跳过</button>
                            <button class="accept" type="button" data-decision="selected">勾</button>
                        </div>
                    </div>
                </article>
            `;
            for (const button of stage.querySelectorAll('button[data-decision]')) {
                button.addEventListener('click', () => {
                    saveAndAdvance(button.dataset.decision).catch(showError);
                });
            }
            stage.querySelector('#note').focus({preventScroll: true});
        }

        async function saveSelection(decision) {
            if (!state.current) return;
            const note = stage.querySelector('#note')?.value || '';
            const response = await fetch('/api/review/selection', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chip_id: state.current.chip_id,
                    decision,
                    note,
                }),
            });
            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.detail || `保存失败：${response.status}`);
            }
        }

        async function saveAndAdvance(decision) {
            await saveSelection(decision);
            state.history.push(state.offset);
            const nextOffset = statusFilter.value === 'unreviewed'
                ? state.offset
                : Math.min(state.offset + 1, Math.max(state.total - 1, 0));
            await loadCard(nextOffset);
        }

        function showError(error) {
            state.loading = false;
            stage.innerHTML = `<p class="error">错误：${error.message}</p>`;
        }

        function resetAndLoad() {
            state.offset = 0;
            state.history = [];
            loadCard(0).catch(showError);
        }

        strokeFilter.addEventListener('change', resetAndLoad);
        statusFilter.addEventListener('change', resetAndLoad);
        prevCard.addEventListener('click', () => {
            const previous = state.history.pop();
            if (previous !== undefined) {
                loadCard(previous).catch(showError);
            }
        });

        document.addEventListener('keydown', (event) => {
            const tag = document.activeElement?.tagName;
            if (tag === 'TEXTAREA' && event.key !== 'Escape') return;
            if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'x') {
                event.preventDefault();
                saveAndAdvance('rejected').catch(showError);
            }
            if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'v') {
                event.preventDefault();
                saveAndAdvance('selected').catch(showError);
            }
            if (event.key === 'ArrowDown' || event.key.toLowerCase() === 's') {
                event.preventDefault();
                saveAndAdvance('unreviewed').catch(showError);
            }
            if (event.key === 'Escape') {
                document.activeElement?.blur();
            }
        });

        loadCard().catch(showError);
    </script>
</body>
</html>
